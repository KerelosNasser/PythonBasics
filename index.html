<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Basics Mastery</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/cards.css" />
  <link rel="stylesheet" href="styles/code.css" />
  <link rel="stylesheet" href="styles/quiz.css" />
  <link rel="stylesheet" href="styles/leaderboard.css" />
  <script src="js/loader.js"></script>
</head>
<body>
<div class="wrap">

  <header>
    <div class="python-logo"><span class="snake">🐍</span></div>
    <h1>Python Basics Mastery</h1>
    <p>// visually driven fundamentals — strictly what you need to start</p>
  </header>

  <nav class="nav-container">
    <!-- Primary Pillars -->
    <div class="nav-primary">
      <button class="nav-btn primary active" data-pillar="leaderboard" onclick="switchPillar('leaderboard')"><span>🏆 Leaderboard</span></button>
      <button class="nav-btn primary"        data-pillar="study"       onclick="switchPillar('study')"><span>📚 Study</span></button>
      <button class="nav-btn primary"        data-pillar="quizzes"     onclick="switchPillar('quiz')"><span>🎯 Quizzes</span></button>
    </div>

    <!-- Secondary Study Navigation (Shown only when Study is active) -->
    <div class="nav-secondary" id="study-subnav">
      <div class="tabs" id="tabs">
        <button class="tab-btn" data-tab="types"       onclick="switchTab('types', event)">📝 Types &amp; I/O</button>
        <button class="tab-btn" data-tab="strings"     onclick="switchTab('strings', event)">🔤 Strings</button>
        <button class="tab-btn" data-tab="loops"       onclick="switchTab('loops', event)">🔄 Loops &amp; Logic</button>
        <button class="tab-btn" data-tab="data"        onclick="switchTab('data', event)">📦 Data Structures</button>
        <button class="tab-btn" data-tab="oop"         onclick="switchTab('oop', event)">🏗️ Functions &amp; OOP</button>
        <button class="tab-btn" data-tab="switch"      onclick="switchTab('switch', event)">🔀 Switch-Case</button>
        <button class="tab-btn" data-tab="strmethod"   onclick="switchTab('strmethod', event)">🧵 String Methods</button>
        <button class="tab-btn" data-tab="arrmethod"   onclick="switchTab('arrmethod', event)">📋 Array Methods</button>
        <button class="tab-btn" data-tab="tkinter"     onclick="switchTab('tkinter', event)">🖼️ Tkinter</button>
        <button class="tab-btn" data-tab="errors"      onclick="switchTab('errors', event)">⚠️ Error Handling</button>
        <button class="tab-btn" data-tab="builtins"    onclick="switchTab('builtins', event)">⚡ Built-ins</button>
        <button class="tab-btn" data-tab="modules"     onclick="switchTab('modules', event)">🧩 Modules</button>
      </div>
    </div>
  </nav>

  <!-- Content Sections (Loaded Lazily from /sections/*.html) -->
  <section class="section active" id="section-leaderboard"></section>
  <section class="section"        id="section-types"></section>
  <section class="section"        id="section-strings"></section>
  <section class="section"        id="section-loops"></section>
  <section class="section"        id="section-data"></section>
  <section class="section"        id="section-oop"></section>
  <section class="section"        id="section-switch"></section>
  <section class="section"        id="section-strmethod"></section>
  <section class="section"        id="section-arrmethod"></section>
  <section class="section"        id="section-tkinter"></section>
  <section class="section"        id="section-errors"></section>
  <section class="section"        id="section-builtins"></section>
  <section class="section"        id="section-modules"></section>
  <section class="section"        id="section-quiz"></section>

</div>

  <script src="js/tabs.js"></script>
  <script src="js/copy.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
